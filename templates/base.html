<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marcani - Gestión Empresarial</title>
    
    <!-- Script ANTI-FLASH BLANCO -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        })();
    </script>

    <!-- Fuente Moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#1a252f">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-icon">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
                <h2>Marcani</h2>
                <span class="subtitle">Gestión</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="{{ url_for('home') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i> <span>Inicio</span>
                </a>
                <a href="{{ url_for('clientes_view') }}" class="nav-item {% if 'clientes' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-users"></i> <span>Clientes</span>
                </a>
                <a href="{{ url_for('productos_view') }}" class="nav-item {% if 'productos' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-boxes-stacked"></i> <span>Productos</span>
                </a>
                <a href="{{ url_for('empleados_view') }}" class="nav-item {% if 'empleados' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-user-tie"></i> <span>Empleados</span>
                </a>
                <a href="{{ url_for('proveedores_view') }}" class="nav-item {% if 'proveedores' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-truck"></i> <span>Proveedores</span>
                </a>
                <a href="{{ url_for('inventario_view') }}" class="nav-item {% if 'inventario' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-warehouse"></i> <span>Inventario</span>
                </a>
                <a href="{{ url_for('catalogo_view') }}" class="nav-item {% if 'catalogo' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-store"></i> <span>Catálogo</span>
                </a>
                <a href="{{ url_for('ventas_view') }}" class="nav-item {% if 'ventas' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-coins"></i> <span>Ventas</span>
                </a>
            </nav>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <header class="top-bar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button onclick="toggleSidebar()" style="background:none; border:none; font-size:1.5rem; color:var(--text-main); display:none; cursor:pointer;" id="menuBtn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1 style="display: flex; align-items: center;">
                        <i class="fa-solid fa-bolt" style="margin-right: 8px;"></i> Panel de Control
                    </h1>
                </div>

                <div class="user-info">
                    <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                        <i class="fa-solid fa-moon"></i>
                    </button>

                    <span style="display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 0.9rem; color: var(--text-main);">
                        <i class="fa-regular fa-user-circle" style="font-size: 1.2rem;"></i> 
                        <span style="max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            {{ session.get('user_name', 'Usuario') }}
                        </span>
                    </span>
                    <a href="{{ url_for('logout') }}" style="background: var(--danger); color: white; padding: 5px 15px; border-radius: 20px; text-decoration: none; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 5px;">
                        <i class="fa-solid fa-right-from-bracket"></i> Salir
                    </a>
                </div>
            </header>

            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- ASISTENTE DE IA NATIVO DEL NAVEGADOR        -->
    <!-- ========================================== -->
    <div id="voiceController" style="position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
        
        <!-- Cuadro de transcripción IA -->
        <div id="voiceTranscriptBox" style="display: none; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--accent-color); border-radius: 12px; padding: 12px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 300px; font-size: 0.95rem; text-align: center; transition: all 0.3s ease;">
            <i class="fa-solid fa-brain" style="color: var(--accent-color); margin-right: 8px;"></i>
            <span id="voiceText">Escuchando...</span>
            <div id="voiceHint" style="font-size: 0.7rem; color: var(--text-light); margin-top: 5px;">IA local interpretando...</div>
        </div>

        <!-- Botón del micrófono -->
        <button id="voiceBtn" style="background: var(--accent-color); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s, background 0.2s; display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-microphone"></i>
        </button>
    </div>

    <!-- SCRIPTS BÁSICOS (Dark mode y Sidebar) -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        if (window.innerWidth <= 768) {
            document.getElementById('menuBtn').style.display = 'block';
        }
        window.addEventListener('resize', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('menuBtn').style.display = 'block';
            } else {
                document.getElementById('menuBtn').style.display = 'none';
                document.getElementById('sidebar').classList.remove('open');
            }
        });

        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme === 'dark') {
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
        }

        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        });
    </script>

    <!-- ========================================== -->
    <!-- ASISTENTE DE IA LOCAL (NAVEGADOR)           -->
    <!-- ========================================== -->
    <script>
        // --- VARIABLE DE ESTADO GLOBAL ---
        let isListeningGlobal = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            const voiceBtn = document.getElementById('voiceBtn');
            const voiceBox = document.getElementById('voiceTranscriptBox');
            const voiceText = document.getElementById('voiceText');
            const voiceHint = document.getElementById('voiceHint');
            let isListening = false;

            function hideVoiceBox() {
                voiceBox.style.display = 'none';
                voiceBtn.style.background = 'var(--accent-color)';
                voiceBtn.querySelector('i').className = 'fa-solid fa-microphone';
                isListening = false;
                isListeningGlobal = false;
                if (recognition) recognition.stop();
            }

            function showVoiceBox() {
                voiceBox.style.display = 'block';
                voiceBtn.style.background = '#e74c3c';
                voiceBtn.querySelector('i').className = 'fa-solid fa-microphone-slash';
                isListening = true;
                isListeningGlobal = true;
                voiceHint.innerText = '🎙️ Escucha continua activada...';
                voiceText.innerText = 'Di "Detener" para salir.';
            }

            voiceBtn.addEventListener('click', () => {
                if (isListening) {
                    hideVoiceBox();
                } else {
                    try {
                        recognition.start();
                        showVoiceBox();
                    } catch (e) {
                        console.log("Error al iniciar el micrófono:", e);
                    }
                }
            });

            // --- REACTIVACIÓN AL CARGAR LA PÁGINA ---
            window.addEventListener('load', function() {
                if (localStorage.getItem('voice_active') === 'true') {
                    setTimeout(() => {
                        try {
                            recognition.start();
                            showVoiceBox();
                        } catch (e) {}
                    }, 500);
                }
            });

            // --- PROCESAR EL TEXTO ---
            recognition.onresult = async (event) => {
                let finalTranscript = '';
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                voiceText.innerText = finalTranscript || interimTranscript;

                if (finalTranscript) {
                    const resultado = await analizarComando(finalTranscript);
                    
                    voiceHint.innerText = '✅ Acción ejecutada';
                    voiceText.innerText = resultado.mensaje;

                    localStorage.setItem('voice_active', 'true');

                    // Ejecutar la acción
                    if (resultado.accion === 'navegar') {
                        window.location.href = resultado.destino;
                    } else if (resultado.accion === 'enfocar') {
                        const elemento = document.querySelector(resultado.selector);
                        if (elemento) {
                            elemento.focus();
                            if (elemento.tagName === 'INPUT' || elemento.tagName === 'SELECT') {
                                elemento.scrollIntoView({ behavior: 'smooth' });
                            }
                        }
                    } else if (resultado.accion === 'seleccionar') {
                        const elemento = document.querySelector(resultado.selector);
                        if (elemento) {
                            elemento.value = resultado.valor;
                            elemento.dispatchEvent(new Event('change'));
                        }
                    } else if (resultado.accion === 'cerrar_sesion') {
                        window.location.href = "{{ url_for('logout') }}";
                    } else if (resultado.accion === 'refrescar') {
                        window.location.reload();
                    } else if (resultado.accion === 'buscar') {
                        const inputBusqueda = document.getElementById('searchInput');
                        if (inputBusqueda) {
                            // 1. Escribimos el texto y forzamos la búsqueda
                            inputBusqueda.value = resultado.textoBusqueda;
                            inputBusqueda.dispatchEvent(new Event('input', { bubbles: true }));
                            inputBusqueda.dispatchEvent(new KeyboardEvent('keyup', { key: 'Enter', bubbles: true }));
                            
                            // 2. INTELIGENCIA: Crear un observador que cierra el teclado SOLO cuando la tabla se actualiza
                            const tabla = document.querySelector('table tbody');
                            if (tabla) {
                                const observer = new MutationObserver(() => {
                                    // Cuando la tabla cambia (los resultados aparecen), cerramos el teclado
                                    inputBusqueda.blur();
                                    observer.disconnect(); // Dejamos de observar para no ralentizar
                                });
                                observer.observe(tabla, { childList: true, subtree: true });
                                
                                // Plan B (Seguro): Si pasan 2 segundos y el observador no se activó, cerramos igual
                                setTimeout(() => {
                                    inputBusqueda.blur();
                                    observer.disconnect();
                                }, 2000);
                            } else {
                                // Si no hay tabla, cerramos el teclado directamente
                                setTimeout(() => inputBusqueda.blur(), 500);
                            }

                            voiceText.innerText = `🔍 Buscando "${resultado.textoBusqueda}"...`;
                        } else {
                            voiceText.innerText = "❌ No hay buscador en esta página.";
                        }
                    } else if (resultado.accion === 'detener') {
                        localStorage.removeItem('voice_active');
                        hideVoiceBox();
                    }
                }
            };

            recognition.onerror = (event) => {
                console.log("Error de voz:", event.error);
                if (event.error === 'not-allowed') {
                    voiceText.innerText = "🚫 Permiso denegado. Permite el micrófono.";
                    localStorage.removeItem('voice_active');
                } else if (event.error === 'no-speech') {
                    // Silencio, ignoramos
                } else {
                    voiceText.innerText = "🔇 Error. Di 'Detener' si falla.";
                }
            };
            recognition.onend = () => {
                if (isListening) {
                    try {
                        recognition.start();
                    } catch (e) {}
                }
            };

        } else {
            document.getElementById('voiceController').style.display = 'none';
            console.log("Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.");
        }

        // --- ANALIZADOR DE COMANDOS ---
        async function analizarComando(comando) {
            const cmd = comando.toLowerCase().trim();

            if (cmd.includes('detener') || cmd.includes('parar') || cmd.includes('apagar') || cmd.includes('callate')) {
                return { accion: 'detener', mensaje: '🔇 Micrófono apagado.' };
            }

            if (cmd.includes('ir a inicio') || cmd.includes('inicio')) return { accion: 'navegar', destino: '/', mensaje: 'Yendo al Inicio' };
            if (cmd.includes('ir a clientes') || cmd.includes('clientes')) return { accion: 'navegar', destino: '/clientes', mensaje: 'Abriendo Clientes' };
            if (cmd.includes('ir a productos') || cmd.includes('productos')) return { accion: 'navegar', destino: '/productos', mensaje: 'Abriendo Productos' };
            if (cmd.includes('ir a empleados') || cmd.includes('empleados')) return { accion: 'navegar', destino: '/empleados', mensaje: 'Abriendo Empleados' };
            if (cmd.includes('ir a proveedores') || cmd.includes('proveedores')) return { accion: 'navegar', destino: '/proveedores', mensaje: 'Abriendo Proveedores' };
            if (cmd.includes('ir a inventario') || cmd.includes('inventario')) return { accion: 'navegar', destino: '/inventario', mensaje: 'Abriendo Inventario' };
            if (cmd.includes('ir a catálogo') || cmd.includes('catalogo')) return { accion: 'navegar', destino: '/catalogo', mensaje: 'Abriendo Catálogo' };
            if (cmd.includes('ir a ventas') || cmd.includes('ventas')) return { accion: 'navegar', destino: '/ventas', mensaje: 'Abriendo Ventas' };
            if (cmd.includes('salir') || cmd.includes('cerrar sesión') || cmd.includes('logout')) return { accion: 'cerrar_sesion', mensaje: 'Cerrando sesión...' };
            if (cmd.includes('recargar') || cmd.includes('refrescar')) return { accion: 'refrescar', mensaje: 'Recargando página...' };

            if (cmd.includes('crear producto') || cmd.includes('nuevo producto')) 
                return { accion: 'enfocar', selector: 'input[name="nombre_producto"]', mensaje: '¡Escribe el nuevo producto!' };
            if (cmd.includes('crear cliente') || cmd.includes('nuevo cliente')) 
                return { accion: 'enfocar', selector: 'input[name="nombre"]', mensaje: '¡Escribe el nuevo cliente!' };
            if (cmd.includes('crear empleado') || cmd.includes('nuevo empleado')) 
                return { accion: 'enfocar', selector: 'input[name="nombre"]', mensaje: '¡Escribe el nuevo empleado!' };

            if (cmd.includes('cliente')) {
                const numero = cmd.match(/\d+/);
                if (numero) {
                    return { accion: 'seleccionar', selector: 'select[name="id_cliente"]', valor: numero[0], mensaje: `Cliente ${numero[0]} seleccionado` };
                }
            }
            if (cmd.includes('producto')) {
                const numero = cmd.match(/\d+/);
                if (numero) {
                    return { accion: 'seleccionar', selector: 'select[name="id_producto"]', valor: numero[0], mensaje: `Producto ${numero[0]} seleccionado` };
                }
            }

            if (cmd.includes('buscar') || cmd.includes('encuentra') || cmd.includes('localiza')) {
                let textoBusqueda = cmd.replace('buscar', '').replace('encuentra', '').replace('localiza', '').trim();
                if (textoBusqueda) {
                    return { accion: 'buscar', textoBusqueda: textoBusqueda, mensaje: `🔍 Buscando "${textoBusqueda}"...` };
                }
            }

            return { accion: 'responder', mensaje: '🤖 No entendí. Di "Buscar [nombre]", "Ir a [página]" o "Crear [elemento]".' };
        }
    </script>

    <!-- Registro del Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('ServiceWorker registrado:', registration.scope);
                })
                .catch(function(error) {
                    console.log('Error SW:', error);
                });
            });
        }
    </script>
</body>
</html>
